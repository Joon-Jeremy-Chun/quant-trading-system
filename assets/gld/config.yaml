# GLD — SPDR Gold Shares ETF
symbol: GLD
data_csv: data/gld_us_d.csv
anchor_output_root: outputs/objective1_anchor_date_multi_horizon_evaluation

# Model parameters
target_horizon_days: 130
update_interval_months: 1
selection_criterion: selection_cv_mse
top_n_per_family: 10

# Anchor optimization
strategy_horizons: 1m,3m,6m,1y,3y,5y,10y
evaluation_horizons: 1m,3m,6m,9m,12m
selection_window_years: 1

# Live output
live_signal_out: outputs/live/latest_gld_signal.json
signal_log_out: outputs/live/history/gld_signal_log.csv
